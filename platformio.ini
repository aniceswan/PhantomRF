; ============================================================================
;  PhantomRF — PlatformIO Build Configuration
; ============================================================================
;
;  Project:       PhantomRF — RF research platform for ESP32 family
;  License:       MIT
;  Build system:  PlatformIO 6.x
;  Primary env:   esp32s3-n16r8  (default, full features)
;
;  --------------------------------------------------------------------------
;  Quick reference
;  --------------------------------------------------------------------------
;   pio run                              # build default env (esp32s3-n16r8)
;   pio run -e esp32s3-n16r8             # build a specific env
;   pio run -e esp32s3-n16r8 -t upload   # build + flash
;   pio run -e esp32s3-n16r8 -t monitor  # build + open serial monitor
;   pio test -e native                   # run host-side unit tests
;   pio run -e <env> -t clean            # clean an env
;
;  --------------------------------------------------------------------------
;  Environments
;  --------------------------------------------------------------------------
;   esp32s3-n16r8   : PRIMARY — ESP32-S3-WROOM-1, 16 MB flash, 8 MB octal PSRAM
;   esp32s3-n8r2    : 16 MB-class board with 8 MB flash + 2 MB quad PSRAM
;   esp32s3-n8      : 8 MB flash, no PSRAM (very tight memory)
;   esp32-classic   : Classic ESP32-WROOM-32 fallback (no native USB, no BLE 5)
;   esp32c3         : ESP32-C3 (RISC-V, single core, limited features)
;   esp32s2         : ESP32-S2 (USB OTG, no BLE)
;   native          : Host-side unit tests (no hardware)
;
;  --------------------------------------------------------------------------
;  Custom build hooks
;  --------------------------------------------------------------------------
;   pre:scripts/pre_build.py   — prints a build banner before compile
;   post:scripts/post_build.py — renames artifacts, computes SHA256,
;                                 creates UF2 (S3 only) and writes manifest.json
;
;  See scripts/post_build.py for the artifact naming convention.
;
; ============================================================================


; ----------------------------------------------------------------------------
; PlatformIO global settings
; ----------------------------------------------------------------------------
[platformio]
default_envs        = esp32s3-n16r8
src_dir             = src
data_dir            = web
; `pre:` runs before SCons build starts, `post:` runs after the build completes.
extra_scripts       = pre:scripts/pre_build.py, post:scripts/post_build.py


; ----------------------------------------------------------------------------
; Shared [env] section — inherited by every [env:xxx] unless overridden
; ----------------------------------------------------------------------------
; Anything that does NOT vary per-board goes here: framework, monitor config,
; library dependencies, lint settings, etc.
[env]
platform            = espressif32 @ ^6.5.0
framework           = arduino

; Serial monitor — 115200 8N1 with ANSI color, timestamps, log prefixes and
; the ESP32 exception decoder (pretty-prints panic backtraces).
monitor_speed       = 115200
monitor_filters     = colorize, time, log, esp32_exception_decoder

; Library dependencies — `^` is the semver caret, so the resolved version may
; be higher than the minimum (within the same major).
lib_deps            =
    nrf24/RF24 @ ^1.6.1
    lsatan/SmartRC-CC1101-Driver-Lib @ ^3.0.2
    h2zero/NimBLE-Arduino @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    gyverlibs/GyverButton @ ^3.7
    bblanchon/ArduinoJson @ ^7.0.0
    me-no-dev/AsyncTCP @ ^3.1.4
    me-no-dev/ESPAsyncWebServer @ ^3.0.0

; NimBLE-Arduino is a drop-in replacement for the bundled "ESP32 BLE" library.
; Without this ignore, the linker picks the wrong one and we get duplicate
; symbol errors. We also ignore a few others we don't need.
lib_ignore          =
    ESP32 BLE
    Ethernet
    SD
    ESP32TinyUSB

; Static analysis — `pio check` runs clang-tidy with the flags below.
; `--inline-suppr` allows `// NOLINT` comments to silence individual findings.
check_tool = clangtidy
check_flags = --enable=all --inline-suppr


; ============================================================================
; ESP32-S3 environments (primary family)
; ============================================================================

; ----------------------------------------------------------------------------
; esp32s3-n16r8 — PRIMARY environment
; ----------------------------------------------------------------------------
; Full-featured build: 16 MB quad flash, 8 MB octal PSRAM, native USB OTG,
; BLE 5.0 LE 2M PHY. Use this for development, demos and the web flasher.
[env:esp32s3-n16r8]
board               = esp32-s3-devkitc-1
board_build.partitions     = partitions/default_16mb.csv
board_build.f_flash        = 80000000L
board_build.flash_mode     = qio
board_build.arduino.memory_type = qio_opi
build_flags         =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32S3_N16R8
    -DPHM_VERSION=\"0.1.0\"
    -I src
    -mtarget-align


; ----------------------------------------------------------------------------
; esp32s3-n8r2 — 8 MB flash + 2 MB quad PSRAM
; ----------------------------------------------------------------------------
; Cheaper than N16R8; still has PSRAM (just smaller, quad-mode instead of
; octal). All features work but PSRAM-heavy buffers (spectrum waterfall,
; recording ring) must be sized down at runtime.
[env:esp32s3-n8r2]
board               = esp32-s3-devkitc-1
board_build.partitions     = partitions/default_8mb.csv
board_build.f_flash        = 80000000L
board_build.flash_mode     = qio
board_build.arduino.memory_type = qio_qspi
build_flags         =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32S3_N8R2
    -DPHM_VERSION=\"0.1.0\"
    -I src
    -mtarget-align


; ----------------------------------------------------------------------------
; esp32s3-n8 — 8 MB flash, NO PSRAM
; ----------------------------------------------------------------------------
; Bottom-tier S3: enough flash for the firmware, but every byte of PSRAM
; must come from internal SRAM (512 KB total). Some features (long
; recordings, large spectrum buffers) are compile-time disabled.
[env:esp32s3-n8]
board               = esp32-s3-devkitc-1
board_build.partitions     = partitions/default_8mb.csv
board_build.f_flash        = 80000000L
board_build.flash_mode     = qio
board_build.arduino.memory_type = qio
build_flags         =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32S3_N8
    -DPHM_VERSION=\"0.1.0\"
    -I src
    -mtarget-align


; ============================================================================
; ESP32 classic + variant environments
; ============================================================================

; ----------------------------------------------------------------------------
; esp32-classic — classic ESP32-WROOM-32 fallback
; ----------------------------------------------------------------------------
; For users who already have a classic ESP32 DevKit. No native USB (use the
; on-board UART-to-USB bridge), no octal PSRAM, no BLE 5. 4 MB flash is
; enough but tight; OTA works, LittleFS shrinks to ~3.5 MB.
[env:esp32-classic]
board               = esp32dev
board_build.partitions     = partitions/default_8mb.csv
board_build.f_flash        = 40000000L
board_build.flash_mode     = dio
build_flags         =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32_CLASSIC
    -DPHM_VERSION=\"0.1.0\"
    -I src


; ----------------------------------------------------------------------------
; esp32c3 — ESP32-C3 (RISC-V, single core, limited features)
; ----------------------------------------------------------------------------
; 4 MB flash, single RISC-V core, no PSRAM, no nRF24 hardware SPI on most
; boards (we bit-bang it). BLE works, WiFi works, CC1101 requires
; bit-banged SPI too. Several attack modules are compile-time stripped.
[env:esp32c3]
board               = esp32-c3-devkitm-1
board_build.partitions     = partitions/minimal.csv
board_build.f_flash        = 40000000L
board_build.flash_mode     = dio
build_flags         =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32C3
    -DPHM_VERSION=\"0.1.0\"
    -I src


; ----------------------------------------------------------------------------
; esp32s2 — ESP32-S2 (USB OTG native, no Bluetooth at all)
; ----------------------------------------------------------------------------
; Same Xtensa LX7 core as S3 but no Bluetooth radio, no PSRAM on most
; modules. Native USB OTG means drag-and-drop UF2 flashing works great.
; ----------------------------------------------------------------------------
; esp32s2 — single-core, USB OTG, NO BLE 5.0
; ----------------------------------------------------------------------------
; KNOWN ISSUE: NimBLE-Arduino 2.5.0 does NOT list ESP32-S2 as supported
; (see h2zero/NimBLE-Arduino README: "Espressif: ESP32, ESP32C3, ESP32S3,
; ESP32C6, ESP32H2, ESP32C2, ESP32C5"). Building `esp32s2` with the
; current dependency set will fail in `NimBLE2904.h` with `#if` syntax
; errors.
;
; Workarounds (choose one):
;   1. Use esp32s3 instead — same form factor, same WiFi, more capable
;   2. Patch NimBLE-Arduino 2.5.0 (not yet done)
;   3. Drop the NimBLE-Arduino lib_deps line and the BleAttack module
;
; We keep this env defined for documentation but mark it as not-yet-
; building until upstream support is restored.
[env:esp32s2]
board               = esp32-s2-saola-1
board_build.partitions     = partitions/minimal.csv
board_build.f_flash        = 40000000L
board_build.flash_mode     = dio
build_flags         =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32
    -DPHM_BOARD=PHM_BOARD_ESP32S2
    -DPHM_VERSION=\"0.1.0\"
    -I src


; ============================================================================
; native — host-side unit tests
; ============================================================================
; `pio test -e native` builds and runs the test suite on the developer's
; machine. Uses the `native` PlatformIO platform (a thin POSIX shim) and
; Unity as the test framework. No firmware, no flashing, no ESP-IDF.
[env:native]
platform            = native
framework           =
test_framework      = unity
build_flags         = -std=c++17
build_src_flags     = -std=c++17 -I src -DUNITY_INCLUDE_DOUBLE
lib_deps            =
check_tool          =
check_flags         =
lib_ignore          =
build_unflags       =
    ; native platform lacks the newlib headers used by the ESP32 Arduino core
    -mtarget-align
; Don't try to compile the firmware (which depends on Arduino) for the
; native environment. We only need the test sources themselves.
test_build_src      = no
